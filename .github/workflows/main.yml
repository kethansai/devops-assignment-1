# ---------------------------------------------------------------------------
# GitHub Actions CI/CD Pipeline — ACEest Fitness & Gym
# Triggered on every push and pull_request to main / develop
# Stages: Build & Lint → Docker Image Assembly → Automated Testing
# ---------------------------------------------------------------------------

name: ACEest CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Stage 1: Build & Lint
  # -------------------------------------------------------------------------
  build-and-lint:
    name: "Stage 1 — Build & Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # E501 (line too long) is suppressed — handled by max-line-length
          flake8 app.py --max-line-length=120 --statistics
          echo "Lint passed ✅"

      - name: Verify app imports cleanly
        run: python -c "from app import app, PROGRAMS, compute_bmi, compute_calories; print('Imports OK ✅')"

  # -------------------------------------------------------------------------
  # Stage 2: Docker Image Assembly
  # -------------------------------------------------------------------------
  docker-build:
    name: "Stage 2 — Docker Image Assembly"
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t aceest-fitness:${{ github.sha }} .
          docker build -t aceest-fitness:latest .
          echo "Docker image built successfully ✅"

      - name: Inspect image size
        run: docker images aceest-fitness

  # -------------------------------------------------------------------------
  # Stage 3: Automated Testing (Pytest inside Docker container)
  # -------------------------------------------------------------------------
  test:
    name: "Stage 3 — Automated Testing"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-fitness:test .

      - name: Run Pytest suite inside Docker
        run: |
          docker run --rm \
            -e PYTHONDONTWRITEBYTECODE=1 \
            aceest-fitness:test \
            pytest tests/ -v --tb=short
          echo "All tests passed ✅"
